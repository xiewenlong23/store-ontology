api_name: complete_task
display_name: 完成任务
description: 售罄结单，in_progress -> completed；商品 sold_out
status: active
target_object_type: Task
edits_object_types:
- Task
- NearExpiryProduct
parameters:
- name: task_id
  type: string
  required: true
- name: target_id
  type: string
  required: true
submission_criteria:
  roles:
  - store_manager
  - system_inventory
  conditions:
  - field: target.status
    operator: is
    value: in_progress
side_effects:
- type: state_transition
  object_type: Task
  match:
    id: $task_id
  from: in_progress
  to: completed
- type: update_object
  object_type: NearExpiryProduct
  match:
    id: $target_id
  fields:
    status: sold_out
locator_field: task_id
