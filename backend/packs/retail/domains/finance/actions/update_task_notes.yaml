api_name: update_task_notes
display_name: 更新任务备注
description: 受治理的 Task 非业务字段更新（notes/priority）。状态与业务字段（discount/sold 等）走各自 Action。
status: active
target_object_type: Task
edits_object_types: [Task]
locator_field: task_id
parameters:
  - { name: task_id,  type: string, required: true }
  - { name: notes,    type: string, required: false }
  - { name: priority, type: string, required: false, constraint: "in:low,medium,high" }
submission_criteria:
  roles: [store_manager, clerk, system_scheduler]
side_effects:
  - type: update_object
    object_type: Task
    match: { id: $task_id }
    fields: { notes: $notes, priority: $priority }
